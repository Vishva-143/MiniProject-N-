{% extends "base.html" %}
{% block title %}Add Marks{% endblock %}

{% block content %}
<div class="container mt-4">
    <h2>Enter Marks</h2>
    <div class="card p-4 bg-secondary">
        <div class="row">
            <div class="col-md-6">
                <label>Subject</label>
                <select id="subject" class="form-control">
                    {% for sub in subjects %}
                    <option value="{{ sub.id }}">{{ sub.subject_name }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="col-md-6">
                <label>Student</label>
                <select id="student" class="form-control">
                    <option>Loading...</option>
                </select>
            </div>
        </div>
        <div class="row mt-3">
            <div class="col-md-4">
                <label>Internal 1 (out of 40)</label>
                <input type="number" id="exam1" class="form-control" min="0" max="40">
            </div>
            <div class="col-md-4">
                <label>Internal 2 (out of 40)</label>
                <input type="number" id="exam2" class="form-control" min="0" max="40">
            </div>
            <div class="col-md-4">
                <label>Internal 3 (out of 40)</label>
                <input type="number" id="exam3" class="form-control" min="0" max="40">
            </div>
        </div>
        <button onclick="saveMarks()" class="btn btn-primary mt-3">Save Marks</button>
        <div id="marks-result" class="mt-3"></div>
    </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
    const subjectSel = document.getElementById('subject');
    if (subjectSel.options.length > 0) {
        loadStudents(subjectSel.value);
        const pre = new URLSearchParams(location.search).get('student');
        if (pre) {
            // Wait for students to load
            setTimeout(() => {
                const sel = document.getElementById('student');
                for (let i = 0; i < sel.options.length; i++) {
                    if (sel.options[i].value === pre) { sel.selectedIndex = i; break; }
                }
            }, 500);
        }
    }
});

document.getElementById('subject').addEventListener('change', function() {
    loadStudents(this.value);
});

function loadStudents(subjectId) {
    let stuSel = document.getElementById('student');
    stuSel.innerHTML = '<option>Loading...</option>';
    fetch(`/get_students_for_subject/${subjectId}`)
    .then(r => r.json())
    .then(data => {
        stuSel.innerHTML = '';
        (data.students || []).forEach(stu => {
            let opt = new Option(stu.name, stu.student_id);
            stuSel.add(opt);
        });
    })
    .catch(err => {
        stuSel.innerHTML = '<option>Error loading students</option>';
        console.error(err);
    });
}

function saveMarks() {
    let data = {
        student_id: document.getElementById('student').value,
        subject_id: document.getElementById('subject').value,
        internal_exam_1: parseInt(document.getElementById('exam1').value) || 0,
        internal_exam_2: parseInt(document.getElementById('exam2').value) || 0,
        internal_exam_3: parseInt(document.getElementById('exam3').value) || 0
    };
    fetch('/add_marks', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify(data)
    }).then(r => r.json()).then(res => {
        const result = document.getElementById('marks-result');
        if (res.success) {
            result.innerHTML = '<div class="alert alert-success">Marks saved successfully.</div>';
        } else {
            result.innerHTML = '<div class="alert alert-danger">Error: ' + (res.error || 'Unable to save marks') + '</div>';
        }
    }).catch(err => {
        const result = document.getElementById('marks-result');
        result.innerHTML = '<div class="alert alert-danger">Network error: failed to save marks.</div>';
        console.error(err);
    });
}
</script>
{% endblock %}
